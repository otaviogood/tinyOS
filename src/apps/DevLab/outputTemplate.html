<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto+Slab">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            color: #d4d4d4;
            overflow: hidden; /* Prevent scrollbars inside iframe */
            font-family: 'Roboto Slab', 'Monaco', 'Menlo', monospace;
        }
        /* Hide text output and errors; canvas is the only visible element */
        #output { display: none; }
        .error { display: none; }
        /* Make canvas fill the iframe */
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #ffffff;
            border: none;
        }
    </style>
</head>
<body>
    <div id="output"></div>
    <canvas id="canvas" width="600" height="400"></canvas>
    <script>
        const output = document.getElementById('output');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;

        // To prevent flicker, we batch draw operations and apply them on a single RAF tick.
        // This avoids the browser painting between a 'clear' and subsequent draw commands.
        let queuedCommands = [];
        let rafPending = false;

        function queueDrawCommands(commands) {
            if (!commands || !commands.length) return;
            queuedCommands.push(...commands);
            if (!rafPending) {
                rafPending = true;
                requestAnimationFrame(() => {
                    rafPending = false;
                    const toRun = queuedCommands;
                    queuedCommands = [];
                    for (const cmd of toRun) {
                        applyDrawCommand(cmd);
                    }
                });
            }
        }

        function resizeCanvas() {
            const cssWidth = document.documentElement.clientWidth;
            const cssHeight = document.documentElement.clientHeight;
            // Ensure CSS size fills the iframe
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            // Backing store size for crisp rendering
            const newWidth = Math.max(1, Math.floor(cssWidth * dpr));
            const newHeight = Math.max(1, Math.floor(cssHeight * dpr));
            if (canvas.width !== newWidth || canvas.height !== newHeight) {
                canvas.width = newWidth;
                canvas.height = newHeight;
            }
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        // Notify parent (DevLab) about canvas logical size in CSS pixels
        function notifySize() {
            const cssWidth = canvas.width / dpr;
            const cssHeight = canvas.height / dpr;
            try {
                window.parent.postMessage({ type: 'canvas_size', width: cssWidth, height: cssHeight }, '*');
            } catch (e) {
                // ignore if cross-origin issues
            }
        }
        notifySize();
        
        function applyDrawCommand(cmd) {
            const units = cmd.units || 'pct';
            ctx.fillStyle = cmd.color || 'black';
            ctx.strokeStyle = cmd.color || 'black';
            // Map coordinates from percent units to canvas pixels
            // x: 0..100 spans full width; y: 0..75 spans full height for a 4:3 area (uses width scale)
            const toXPx = (v) => units === 'px' ? Number(v) : (Number(v) / 100) * (canvas.width / dpr);
            const toYPx = (v) => units === 'px' ? Number(v) : (Number(v) / 100) * (canvas.width / dpr);
            
            switch (cmd.type) {
                case 'clear':
                    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
                    break;
                case 'background':
                    ctx.save();
                    ctx.fillStyle = cmd.color || 'white';
                    ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);
                    ctx.restore();
                    break;
                case 'circle':
                    ctx.beginPath();
                    // In pct mode, radius uses width scale so 1 == 1% of width
                    const r = units === 'px' ? Number(cmd.radius) : toXPx(cmd.radius);
                    ctx.arc(toXPx(cmd.x), toYPx(cmd.y), r, 0, Math.PI * 2);
                    ctx.fill();
                    break;
                case 'rect':
                    ctx.fillRect(toXPx(cmd.x), toYPx(cmd.y), toXPx(cmd.width), toYPx(cmd.height));
                    break;
                case 'line':
                    ctx.lineWidth = units === 'px' ? Number(cmd.width) : (Number(cmd.width) / 100) * (canvas.width / dpr);
                    ctx.beginPath();
                    ctx.moveTo(toXPx(cmd.x1), toYPx(cmd.y1));
                    ctx.lineTo(toXPx(cmd.x2), toYPx(cmd.y2));
                    ctx.stroke();
                    break;
                case 'text':
                    ctx.save();
                    ctx.fillStyle = cmd.color || 'black';
                    ctx.textAlign = cmd.align || 'left';   // 'left' | 'center' | 'right'
                    ctx.textBaseline = 'top';              // y is the top of the text
                    const size = Number(cmd.size ?? 48);   // font size in CSS pixels
                    ctx.font = `${size}px Roboto Slab, Monaco, Menlo, monospace`;
                    ctx.fillText(String(cmd.text ?? ''), toXPx(cmd.x), toYPx(cmd.y));
                    ctx.restore();
                    break;
            }
        }

        window.addEventListener('message', (e) => {
            if (e.data.type === 'clear') {
                // Queue clear to execute atomically with any immediately-following draw calls
                queueDrawCommands([{ type: 'clear' }]);
            } else if (e.data.type === 'print') {
                // Intentionally ignore textual output in full-canvas mode
            } else if (e.data.type === 'error') {
                // Intentionally ignore textual errors in full-canvas mode
            } else if (e.data.type === 'draw_batch') {
                queueDrawCommands(e.data.commands || []);
            } else if (e.data.type === 'draw') {
                // Backwards-compatible single-command path, but still queued to prevent flicker.
                queueDrawCommands([e.data.command]);
            }
        });

        // Report new size on resize (after applying DPR changes)
        window.addEventListener('resize', () => {
            // resizeCanvas already called above due to listener, so just notify
            notifySize();
        });
    </script>
</body>
</html>
